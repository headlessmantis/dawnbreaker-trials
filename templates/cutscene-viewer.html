<div class="db-cutscene-backdrop">
  <div class="db-cutscene-frame">
    <div class="db-cutscene-bar db-cutscene-bar-top"></div>
    <img class="db-cutscene-img" src="{{img}}" alt=""/>
    <div class="db-cutscene-bar db-cutscene-bar-bottom">
      {{#if caption}}<div class="db-cutscene-caption">{{caption}}</div>{{/if}}
    </div>
    {{#if isGM}}<button type="button" class="db-cutscene-dismiss" title="Close for everyone">✕</button>{{/if}}
  </div>
</div>
